<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhay Pro Cloud IDE | VIP Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA8J1dg-LAefkkIJTRDqsF3_StdOBe1KSE",
            authDomain: "abhay-cloud-ide.firebaseapp.com",
            projectId: "abhay-cloud-ide",
            storageBucket: "abhay-cloud-ide.firebasestorage.app",
            messagingSenderId: "585916257013",
            appId: "1:585916257013:web:4382659f728a9da878abbc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();

        window.handleAuth = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const btn = document.getElementById('authBtn');
            const msg = document.getElementById('msg');
            
            if(!email || !pass) { 
                msg.innerHTML = "<span class='text-red-400'><i class='fas fa-exclamation-triangle'></i> Empty fields!</span>"; 
                return; 
            }
            
            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Verifying VIP Access...";
            
            try {
                try {
                    await signInWithEmailAndPassword(auth, email, pass);
                } catch {
                    await createUserWithEmailAndPassword(auth, email, pass);
                }
                msg.innerHTML = "<span class='text-green-400'><i class='fas fa-shield-check'></i> Access Granted!</span>";
                
                setTimeout(() => {
                    window.location.href = "https://codespaces.new/abhay711x-jpg/Abhay-IDE-Engine"; 
                }, 1500);
                
            } catch (error) {
                msg.innerHTML = `<span class='text-red-400'><i class='fas fa-times-circle'></i> ${error.message}</span>`;
                btn.innerHTML = "Launch VIP Workspace <i class='fas fa-rocket ml-2'></i>";
            }
        };

        window.resetPassword = async () => {
            const email = document.getElementById('resetEmail').value;
            const resetMsg = document.getElementById('resetMsg');
            if (!email) { resetMsg.innerHTML = "<span class='text-red-400'>Enter email first.</span>"; return; }
            try {
                await sendPasswordResetEmail(auth, email);
                resetMsg.innerHTML = "<span class='text-green-400'><i class='fas fa-check'></i> Link Sent!</span>";
            } catch (error) { resetMsg.innerHTML = `<span class='text-red-400'>${error.message}</span>`; }
        };

        window.toggleForgot = () => {
            document.getElementById('login-panel').classList.toggle('hidden');
            document.getElementById('forgot-panel').classList.toggle('hidden');
        };

        // NEW MAGIC EYE BUTTON FUNCTION 👁️👿
        window.togglePassword = () => {
            const passInput = document.getElementById('pass');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
                eyeIcon.classList.add('text-yellow-500'); // Glow effect when visible
            } else {
                passInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
                eyeIcon.classList.remove('text-yellow-500');
            }
        };
    </script>
    <style>
        body { background: #000000; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .ambient-light { position: absolute; width: 400px; height: 400px; background: radial-gradient(circle, rgba(168,85,247,0.2) 0%, rgba(0,0,0,0) 70%); top: -100px; right: -100px; border-radius: 50%; z-index: 0; }
        .ambient-light-2 { position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(0,0,0,0) 70%); bottom: -200px; left: -100px; border-radius: 50%; z-index: 0; }
        
        .vip-card { background: rgba(10, 10, 15, 0.7); backdrop-filter: blur(25px); border: 1px solid rgba(255, 215, 0, 0.2); box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05); position: relative; z-index: 10; }
        
        .vip-input { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; color: #fff; }
        .vip-input:focus { border-color: #eab308; box-shadow: 0 0 15px rgba(234, 179, 8, 0.2); outline: none; }
        
        .vip-btn { background: linear-gradient(135deg, #eab308, #ca8a04); color: #000; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .vip-btn:hover { box-shadow: 0 10px 25px rgba(234, 179, 8, 0.4); transform: scale(1.02); }

        .gold-text { background: linear-gradient(to right, #fde047, #eab308); -webkit-background-clip: text; color: transparent; }
        
        .social-btn { transition: all 0.3s ease; }
        .social-btn.insta:hover { color: #e1306c; transform: scale(1.2); filter: drop-shadow(0 0 10px rgba(225, 48, 108, 0.5)); }
        .social-btn.fb:hover { color: #1877f2; transform: scale(1.2); filter: drop-shadow(0 0 10px rgba(24, 119, 242, 0.5)); }
        .social-btn.yt:hover { color: #ff0000; transform: scale(1.2); filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.5)); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen relative">
    
    <div class="ambient-light"></div>
    <div class="ambient-light-2"></div>

    <div class="w-full max-w-md p-6 relative z-10">
        
        <div id="login-panel" class="vip-card p-8 rounded-3xl">
            <div class="text-center mb-8">
                <i class="fas fa-crown text-4xl mb-3 text-yellow-500" style="filter: drop-shadow(0 0 10px rgba(234,179,8,0.5));"></i>
                <h1 class="text-3xl font-black tracking-tight mb-1">ABHAY <span class="gold-text">IDE</span></h1>
                <p class="text-gray-400 text-xs font-bold tracking-[0.3em] uppercase">Premium Workspace</p>
            </div>

            <div class="space-y-5">
                <div>
                    <input id="email" type="email" placeholder="VIP Email Address" class="vip-input w-full p-4 rounded-xl placeholder-gray-500">
                </div>
                
                <div>
                    <div class="flex justify-end mb-1 mr-1">
                        <button onclick="toggleForgot()" class="text-[10px] text-yellow-500 hover:text-yellow-300 uppercase tracking-wider font-bold transition">Forgot Password?</button>
                    </div>
                    <div class="relative">
                        <input id="pass" type="password" placeholder="Secure Password" class="vip-input w-full p-4 rounded-xl placeholder-gray-500 pr-12">
                        <button onclick="togglePassword()" type="button" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-yellow-500 transition focus:outline-none">
                            <i id="eyeIcon" class="fas fa-eye text-lg"></i>
                        </button>
                    </div>
                </div>
                
                <p id="msg" class="text-xs text-center font-medium h-4"></p>
                
                <button id="authBtn" onclick="handleAuth()" class="vip-btn w-full p-4 rounded-xl font-black mt-2">
                    Launch VIP Workspace <i class="fas fa-rocket ml-2"></i>
                </button>
            </div>

            <div class="mt-8 pt-6 border-t border-gray-800/50 flex flex-col items-center">
                <div class="flex items-center gap-2 bg-yellow-500/10 px-4 py-2 rounded-full border border-yellow-500/20 mb-4">
                    <i class="fas fa-shield-alt text-yellow-500 text-sm"></i>
                    <span class="gold-text font-black tracking-widest uppercase text-xs">Developed by Abhay Gupta</span>
                </div>
                
                <div class="flex gap-6 mt-2">
                    <a href="https://www.instagram.com/abhay.___06?igsh=MXF5MWV6eGR4eHo3MA==" target="_blank" class="social-btn insta text-gray-400 text-2xl">
                        <i class="fab fa-instagram"></i>
                    </a>
                    <a href="https://www.facebook.com/profile.php?id=100029204985032&mibextid=ZbWKwL" target="_blank" class="social-btn fb text-gray-400 text-2xl">
                        <i class="fab fa-facebook"></i>
                    </a>
                    <a href="https://youtube.com/@abhay00f.k?si=Z7sy2K9jkRjnG3vI" target="_blank" class="social-btn yt text-gray-400 text-2xl">
                        <i class="fab fa-youtube"></i>
                    </a>
                </div>
            </div>
        </div>

        <div id="forgot-panel" class="vip-card p-8 rounded-3xl hidden">
            <button onclick="toggleForgot()" class="text-gray-400 hover:text-white mb-6 transition text-sm"><i class="fas fa-arrow-left"></i> Back</button>
            <div class="mb-6">
                <h2 class="text-2xl font-bold mb-2 gold-text">Reset Password</h2>
                <p class="text-gray-400 text-xs">Enter your email to receive a secure recovery link.</p>
            </div>

            <div class="space-y-5">
                <input id="resetEmail" type="email" placeholder="Registered Email" class="vip-input w-full p-4 rounded-xl">
                <p id="resetMsg" class="text-xs text-center font-medium h-4"></p>
                <button onclick="resetPassword()" class="vip-btn w-full p-4 rounded-xl font-black">
                    Send Link <i class="fas fa-envelope ml-2"></i>
                </button>
            </div>
        </div>

    </div>

</body>
</html>
